kind = "web"
previewPath = "/"
title = "Controle de Estoque"
version = "1.0.0"
id = "artifacts/estoque"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20993

[services.development]
run = "pnpm --filter @workspace/estoque run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estoque", "run", "build" ]
publicDir = "artifacts/estoque/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20993"
BASE_PATH = "/"
